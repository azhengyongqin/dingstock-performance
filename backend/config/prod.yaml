# 线上环境层配置：覆盖 app.yaml 基础层；密钥和连接串必须在部署平台通过环境变量注入。
app:
  port: 3000

database:
  url: postgres://postgres:postgres@localhost:5432/postgres

redis:
  uri: redis://localhost:6379/0

lark:
  appId: ''
  appSecret: ''
  # 生产默认发送飞书通知（显式声明，防止误关）。
  notification:
    enabled: true

auth:
  # 生产环境默认关闭；如临时开启，必须同时配置恰好 32 位的 password。
  devLogin:
    enabled: false
    # password: ''
