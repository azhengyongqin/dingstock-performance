# 应用公共基础配置：所有环境共享的默认值。
# 加载顺序：app.yaml（本文件，基础层）→ dev.yaml/prod.yaml（环境层，可覆盖）→ 环境变量（最高优先级）。
app:
  port: 3000

database:
  url: postgres://dingstock:dingstock@localhost:5432/dingstock

redis:
  uri: redis://localhost:6379/0

# AI 报告默认关闭；启用时用环境变量注入 endpoint/apiKey/model，避免提交供应商密钥。
aiReport:
  enabled: false
  timeoutMs: 30000

lark:
  # 自建应用凭证；生产环境建议通过 LARK_APP_ID/LARK_APP_SECRET 环境变量覆盖。
  appId: 'cli_aabbb04358385cca'
  appSecret: 'It5XV8Rzrl7ZNtG7dgoSwhBsjeuchWRJ'
  # 飞书 OAuth2（网页授权登录）配置
  oauth:
    # 飞书授权页地址（authen v1 authorize）
    authorizeUrl: https://accounts.feishu.cn/open-apis/authen/v1/authorize
    # 授权完成后飞书回调到后端的地址，必须与开放平台「安全设置-重定向 URL」一致
    redirectUri: http://localhost:3000/auth/lark/callback
    # 需要的用户授权 scope，多个用空格分隔；留空表示仅基础身份信息
    scope: ''
    # 后端换取 token 成功后跳回前端的地址（前端回调页）
    webRedirectUrl: http://localhost:3001/auth/callback

auth:
  # 默认管理员：登录用户 open_id 命中后始终拥有 ADMIN，包括空库首次组织同步场景。
  # 生产部署可通过 AUTH_DEFAULT_ADMIN_OPEN_ID 覆盖。
  defaultAdminOpenId: ou_d081669b3d00fa5912f3c0928cd5bef8
  jwt:
    # 应用会话 JWT 密钥；生产环境务必用 AUTH_JWT_SECRET 环境变量覆盖
    secret: dingstock-performance-dev-secret
    # 会话有效期（如 7d、12h）
    expiresIn: 7d
